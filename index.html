<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수술실 감염관리 챌린지</title>
    <style>
        body { margin: 0; background: #f0f8ff; font-family: sans-serif; overflow: hidden; text-align: center; }
        canvas { background: #ffffff; display: block; margin: 0 auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        #ui { position: absolute; top: 10px; width: 100%; pointer-events: none; }
        .score { font-size: 20px; font-weight: bold; color: #2c3e50; }
        .question { font-size: 18px; background: rgba(255,255,255,0.8); padding: 10px; margin: 5px; border-radius: 10px; pointer-events: auto; }
        .controls { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 20px; }
        .btn { width: 80px; height: 80px; border-radius: 50%; border: none; color: white; font-size: 24px; font-weight: bold; cursor: pointer; }
        .btn-o { background: #2ecc71; }
        .btn-x { background: #e74c3c; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="score">점수: <span id="scoreVal">0</span></div>
        <div id="qText" class="question">질문 로딩 중...</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="controls">
        <button class="btn btn-o" onclick="movePlayer('O')">O</button>
        <button class="btn btn-x" onclick="movePlayer('X')">X</button>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth > 500 ? 400 : window.innerWidth;
    canvas.height = window.innerHeight - 150;

    let score = 0;
    let currentQ = {};
    const fallingItems = [];
    
    // 퀴즈 데이터 (수정 가능)
    const quizData = [
        { q: "수술 전 손위생은 멸균 장갑 착용 시 생략 가능하다.", a: "X" },
        { q: "멸균 가운의 멸균 영역은 허리 앞부분부터 가슴 높이까지다.", a: "O" },
        { q: "마스크는 코와 입을 완전히 가려야 한다.", a: "O" },
        { q: "수술 중 오염된 기구는 즉시 멸균 구역 밖으로 제거한다.", a: "O" }
    ];

    let player = { x: canvas.width / 2 - 25, y: canvas.height - 60, w: 50, h: 50 };

    function nextQuestion() {
        currentQ = quizData[Math.floor(Math.random() * quizData.length)];
        document.getElementById('qText').innerText = currentQ.q;
        spawnItem();
    }

    function spawnItem() {
        const types = ['O', 'X'];
        types.forEach((type, index) => {
            fallingItems.push({
                x: (canvas.width / 3) * (index + 1) - 20,
                y: -50,
                text: type,
                speed: 2 + Math.random() * 2
            });
        });
    }

    function movePlayer(type) {
        if (type === 'O') player.x = (canvas.width / 3) - 25;
        if (type === 'X') player.x = (canvas.width / 3 * 2) - 25;
        checkAnswer(type);
    }

    function checkAnswer(choice) {
        if (choice === currentQ.a) {
            score += 10;
            alert("정답입니다! 👏");
        } else {
            score -= 5;
            alert("오답입니다! 😭 다시 확인해 보세요.");
        }
        document.getElementById('scoreVal').innerText = score;
        fallingItems.length = 0; // 초기화
        nextQuestion();
    }

    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 플레이어 (캐릭터 대용)
        ctx.fillStyle = "#3498db";
        ctx.fillRect(player.x, player.y, player.w, player.h);
        ctx.fillStyle = "white";
        ctx.fillText("ME", player.x + 15, player.y + 30);

        // 떨어지는 아이템 그리기
        fallingItems.forEach((item, i) => {
            item.y += item.speed;
            ctx.fillStyle = item.text === 'O' ? "#2ecc71" : "#e74c3c";
            ctx.font = "bold 30px Arial";
            ctx.fillText(item.text, item.x, item.y);

            // 바닥에 닿으면 다시 생성
            if (item.y > canvas.height) {
                item.y = -50;
            }
        });

        requestAnimationFrame(update);
    }

    nextQuestion();
    update();

</script>
</body>
</html>
