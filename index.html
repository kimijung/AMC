<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMC 수술실 감염관리 챌린지</title>
    <style>
        /* --- 공통 스타일 (배경 이미지 설정 포함) --- */
        body {
            margin: 0;
            font-family: 'Malgun Gothic', sans-serif;
            overflow: hidden;
            text-align: center;
            width: 100vw;
            height: 100vh;
            
            /* 🖼️ [배경 이미지 넣는 곳] 🖼️ */
            /* 1단계: 저장소에 이미지 업로드 (예: bg.jpg) */
            /* 2단계: 아래 줄의 주석(/*)을 제거하고 파일명을 맞추세요 */
            /* background-image: url('bg.jpg'); */
            
            /* 이미지가 없더라도 기본으로 보일 색상 */
            background-color: #f0f8ff; 
            background-size: cover; /* 화면을 꽉 채우게 */
            background-position: center; /* 가운데 정렬 */
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- 1. 입력 화면 (Entry Screen) 스타일 --- */
        #entryScreen {
            background: rgba(255, 255, 255, 0.95); /* 약간 투명한 흰색 배경 */
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            z-index: 10; /* 가장 위에 띄움 */
        }
        #entryScreen h1 { color: #2c3e50; margin-bottom: 10px; font-size: 24px;}
        #entryScreen p { color: #7f8c8d; margin-bottom: 30px; font-size: 14px;}
        
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #34495e; }
        .input-group input {
            width: 250px; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px;
        }
        .input-group input:focus { border-color: #3498db; outline: none; }

        #startBtn {
            background-color: #3498db; color: white; border: none; padding: 15px 40px;
            font-size: 18px; font-weight: bold; border-radius: 30px; cursor: pointer;
            transition: background 0.3s; margin-top: 20px; width: 100%;
        }
        #startBtn:hover { background-color: #2980b9; }

        /* --- 2. 게임 화면 (Game Screen) 스타일 --- */
        #gameScreen {
            display: none; /* 💡처음엔 숨겨둠 */
            position: relative;
            width: 100%; height: 100%;
        }

        /* 기존 게임 스타일들... */
        canvas { background: rgba(255,255,255,0.7); display: block; margin: 0 auto; }
        #ui { position: absolute; top: 10px; width: 100%; pointer-events: none; }
        .score { font-size: 18px; font-weight: bold; color: #2c3e50; background: rgba(255,255,255,0.8); padding: 5px; border-radius: 5px; display: inline-block;}
        .question { font-size: 18px; background: rgba(255,255,255,0.9); padding: 15px; margin: 10px auto; border-radius: 10px; width: 80%; max-width: 400px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); pointer-events: auto; }
        .controls { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 30px; }
        .btn { width: 90px; height: 90px; border-radius: 50%; border: none; color: white; font-size: 30px; font-weight: bold; cursor: pointer; box-shadow: 0 5px 10px rgba(0,0,0,0.2); }
        .btn-o { background: #2ecc71; }
        .btn-x { background: #e74c3c; }
    </style>
</head>
<body>

    <div id="entryScreen">
        <h1>🏥 감염관리 챌린지</h1>
        <p>수술간호팀 여러분, 환영합니다!</p>
        
        <div class="input-group">
            <label>소속</label>
            <input type="text" id="affiliationInput" placeholder="예: 소속 유닛 " value="A로젯">
        </div>
        <div class="input-group">
            <label>이름</label>
            <input type="text" id="nameInput" placeholder="이름을 입력하세요">
        </div>

        <button id="startBtn" onclick="startGame()">게임 시작!</button>
    </div>

    <div id="gameScreen">
        <div id="ui">
            <div class="score"><span id="playerInfo"></span> | 점수: <span id="scoreVal">0</span></div>
            <div id="qText" class="question">질문 로딩 중...</div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div class="controls">
            <button class="btn btn-o" onclick="chooseAnswer('O')">O</button>
            <button class="btn btn-x" onclick="chooseAnswer('X')">X</button>
        </div>
    </div>
