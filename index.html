<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMC 수술실 감염관리 챌린지</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            background-image: url('main_bg.png');
            background-color: #f0f8ff;
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #entryScreen {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 300px;
            z-index: 10;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #34495e;
        }

        .input-group input {
            width: 90%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
        }

        #gameScreen {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        canvas {
            background: rgba(255, 255, 255, 0.15);
            display: block;
            margin: 0 auto;
        }

        #ui {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            pointer-events: none;
        }

        .score-board {
            font-size: 18px;
            font-weight: bold;
            background: rgba(255,255,255,0.9);
            padding: 8px 16px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 10px;
        }

        .guide-box {
            font-size: 17px;
            background: white;
            padding: 12px 18px;
            border-radius: 12px;
            width: 88%;
            max-width: 520px;
            margin: 0 auto;
            box-shadow: 0 4px 8px rgba(0,0,0,0.12);
            font-weight: bold;
            line-height: 1.5;
        }

        #feedback {
            margin-top: 10px;
            font-size: 22px;
            font-weight: bold;
            min-height: 32px;
        }

        #resultScreen {
            display: none;
            background: rgba(255, 255, 255, 0.95);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
        }

        .controls {
            position: fixed;
            bottom: 25px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 24px;
        }

        .btn-move {
            width: 110px;
            height: 80px;
            border-radius: 18px;
            font-size: 28px;
            font-weight: bold;
        }

        .left-zone {
            background: #5dade2;
        }

        .right-zone {
            background: #58d68d;
        }
    </style>
</head>
<body>

    <div id="entryScreen">
        <h2 style="color:#2c3e50;">🏥 감염관리 챌린지</h2>
        <div class="input-group">
            <label>소속</label>
            <input type="text" id="affiliationInput" placeholder="소속 입력">
        </div>
        <div class="input-group">
            <label>이름</label>
            <input type="text" id="nameInput" placeholder="이름 입력">
        </div>
        <button onclick="startGame()">Start Game</button>
    </div>

    <div id="gameScreen">
        <div id="ui">
            <div class="score-board">
                <span id="playerInfo"></span> | 점수: <span id="scoreVal">0</span> | 진행: <span id="progressVal">0</span>/<span id="totalVal">12</span>
            </div>
            <div class="guide-box">
                좋은 감염관리 행동은 받으세요 / 위험한 행동은 피하세요
            </div>
            <div id="feedback"></div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <div class="controls">
            <button class="btn-move left-zone" onclick="moveLeft()">◀</button>
            <button class="btn-move right-zone" onclick="moveRight()">▶</button>
        </div>
    </div>

    <div id="resultScreen">
        <h2 style="color:#2c3e50;">수고하셨습니다!</h2>
        <p id="finalScore" style="font-size: 24px; font-weight: bold;"></p>
        <p id="finalComment" style="font-size: 18px;"></p>
        <button onclick="location.reload()">다시 하기</button>
    </div>

<script>
    const actionData = [
        { text: "손위생 시행", good: true },
        { text: "멸균 장갑 착용", good: true },
        { text: "마스크로 코와 입 완전 가림", good: true },
        { text: "필요 전 기구 소독 확인", good: true },
        { text: "오염된 장갑으로 다른 기구 만짐", good: false },
        { text: "마스크를 코 아래로 착용", good: false },
        { text: "손위생 없이 환자 접촉", good: false },
        { text: "유치도뇨관 삽입 전 충분한 소독 생략", good: false },
        { text: "오염 구역 물품을 청결 구역에 둠", good: false },
        { text: "무균술 지키며 처치 준비", good: true },
        { text: "주사 전 손위생 시행", good: true },
        { text: "찔림 사고를 보고하지 않음", good: false }
    ];

    let score = 0;
    let isGameRunning = false;
    let fallingItems = [];
    let spawnTimer = 0;
    let itemsShown = 0;
    const totalItems = 12;
    const maxFallingItems = 1;

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
        canvas.width = window.innerWidth > 500 ? 420 : window.innerWidth;
        canvas.height = window.innerHeight;
        player.y = canvas.height - 170;
    }

    const playerImg = new Image();
    playerImg.src = 'Me.png';

    let player = {
        x: 0,
        y: 0,
        w: 70,
        h: 70,
        speed: 60
    };

    function resetPlayerPosition() {
        player.x = canvas.width / 2 - player.w / 2;
        player.y = canvas.height - 170;
    }

    resizeCanvas();
    resetPlayerPosition();

    window.addEventListener('resize', () => {
        resizeCanvas();
        if (!isGameRunning) resetPlayerPosition();
    });

    function startGame() {
        const affiliation = document.getElementById('affiliationInput').value.trim();
        const name = document.getElementById('nameInput').value.trim();

        if (!name) {
            alert("이름을 입력해 주세요!");
            return;
        }

        document.getElementById('playerInfo').innerText = `${affiliation} ${name}`.trim();
        document.getElementById('entryScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'block';

        score = 0;
        fallingItems = [];
        spawnTimer = 0;
        itemsShown = 0;
        isGameRunning = true;

        document.getElementById('scoreVal').innerText = score;
        document.getElementById('progressVal').innerText = itemsShown;
        document.getElementById('totalVal').innerText = totalItems;
        document.getElementById('feedback').innerText = "";

        resetPlayerPosition();
        update();
    }

    function moveLeft() {
        if (!isGameRunning) return;
        player.x -= player.speed;
        if (player.x < 0) player.x = 0;
    }

    function moveRight() {
        if (!isGameRunning) return;
        player.x += player.speed;
        if (player.x + player.w > canvas.width) {
            player.x = canvas.width - player.w;
        }
    }

    document.addEventListener('keydown', (e) => {
        if (!isGameRunning) return;
        if (e.key === 'ArrowLeft') moveLeft();
        if (e.key === 'ArrowRight') moveRight();
    });

    function spawnItem() {
        if (itemsShown >= totalItems) return;
        if (fallingItems.length >= maxFallingItems) return;

        const data = actionData[Math.floor(Math.random() * actionData.length)];
        const itemWidth = canvas.width * 0.68;
        const x = (canvas.width - itemWidth) / 2;

        fallingItems.push({
            x: x,
            y: -90,
            w: itemWidth,
            h: 72,
            text: data.text,
            good: data.good,
            scored: false,
            speed: 2 + Math.random() * 1.2
        });

        itemsShown++;
        document.getElementById('progressVal').innerText = itemsShown;
    }

    function showFeedback(text, color) {
        const feedback = document.getElementById('feedback');
        feedback.innerText = text;
        feedback.style.color = color;

        clearTimeout(showFeedback.timer);
        showFeedback.timer = setTimeout(() => {
            feedback.innerText = "";
        }, 700);
    }

    function isColliding(a, b) {
        return (
            a.x < b.x + b.w &&
            a.x + a.w > b.x &&
            a.y < b.y + b.h &&
            a.y + a.h > b.y
        );
    }

    function endGame() {
        isGameRunning = false;
        document.getElementById('gameScreen').style.display = 'none';
        document.getElementById('resultScreen').style.display = 'block';
        document.getElementById('finalScore').innerText = `최종 점수: ${score}점`;

        let comment = "";
        if (score >= 80) {
            comment = "훌륭합니다! 감염관리 판단이 매우 정확합니다.";
        } else if (score >= 40) {
            comment = "좋습니다. 몇 가지 위험 행동만 더 주의하면 됩니다.";
        } else {
            comment = "위험 행동과 올바른 행동을 다시 복습해 보세요.";
        }
        document.getElementById('finalComment').innerText = comment;
    }

    function update() {
        if (!isGameRunning) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        spawnTimer++;
        if (spawnTimer > 80) {
            spawnItem();
            spawnTimer = 0;
        }

        ctx.drawImage(playerImg, player.x, player.y, player.w, player.h);

        ctx.fillStyle = "rgba(255,255,255,0.9)";
        ctx.fillRect(0, canvas.height - 95, canvas.width, 95);

        ctx.fillStyle = "#2e86c1";
        ctx.font = "bold 18px Malgun Gothic";
        ctx.fillText("좋은 행동은 받기", 20, canvas.height - 35);

        ctx.fillStyle = "#27ae60";
        ctx.font = "bold 18px Malgun Gothic";
        ctx.fillText("위험한 행동은 피하기", canvas.width - 160, canvas.height - 35);

        for (let i = fallingItems.length - 1; i >= 0; i--) {
            const item = fallingItems[i];
            item.y += item.speed;

            ctx.fillStyle = item.good ? "#d4efdf" : "#fadbd8";
            ctx.strokeStyle = item.good ? "#27ae60" : "#c0392b";
            ctx.lineWidth = 2;
            roundRect(ctx, item.x, item.y, item.w, item.h, 14, true, true);

            ctx.fillStyle = item.good ? "#1e8449" : "#922b21";
            ctx.font = "bold 17px Malgun Gothic";
            wrapText(ctx, item.text, item.x + 12, item.y + 28, item.w - 24, 24);

            if (isColliding(player, item) && !item.scored) {
                item.scored = true;

                if (item.good) {
                    score += 10;
                    showFeedback("좋은 행동을 잘 받았습니다! +10", "#27ae60");
                } else {
                    score -= 10;
                    showFeedback("위험한 행동에 닿았습니다! -10", "#c0392b");
                }

                document.getElementById('scoreVal').innerText = score;
                fallingItems.splice(i, 1);
                continue;
            }

            if (item.y > canvas.height) {
                if (item.good) {
                    score -= 5;
                    showFeedback("좋은 행동을 놓쳤습니다! -5", "#d35400");
                    document.getElementById('scoreVal').innerText = score;
                }
                fallingItems.splice(i, 1);
            }
        }

        if (itemsShown >= totalItems && fallingItems.length === 0) {
            endGame();
            return;
        }

        requestAnimationFrame(update);
    }

    function roundRect(ctx, x, y, width, height, radius, fill, stroke) {
        if (typeof radius === 'number') {
            radius = { tl: radius, tr: radius, br: radius, bl: radius };
        }

        ctx.beginPath();
        ctx.moveTo(x + radius.tl, y);
        ctx.lineTo(x + width - radius.tr, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius.tr);
        ctx.lineTo(x + width, y + height - radius.br);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius.br, y + height);
        ctx.lineTo(x + radius.bl, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius.bl);
        ctx.lineTo(x, y + radius.tl);
        ctx.quadraticCurveTo(x, y, x + radius.tl, y);
        ctx.closePath();

        if (fill) ctx.fill();
        if (stroke) ctx.stroke();
    }

    function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
        const words = text.split(' ');
        let line = '';

        for (let n = 0; n < words.length; n++) {
            const testLine = line + words[n] + ' ';
            const metrics = ctx.measureText(testLine);
            const testWidth = metrics.width;

            if (testWidth > maxWidth && n > 0) {
                ctx.fillText(line, x, y);
                line = words[n] + ' ';
                y += lineHeight;
            } else {
                line = testLine;
            }
        }
        ctx.fillText(line, x, y);
    }
</script>
</body>
</html>
