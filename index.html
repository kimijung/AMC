<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMC 수술실 감염관리 챌린지</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Malgun Gothic', sans-serif;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-image: url('main_bg2.png');
            background-color: #f0f8ff;
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #entryScreen, #resultScreen {
            background: rgba(255, 255, 255, 0.95);
            padding: 32px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 320px;
            text-align: center;
        }

        #gameScreen {
            display: none;
            width: 100%;
            height: 100%;
            position: relative;
        }

        #ui {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            box-sizing: border-box;
        }

        .score-board {
            font-size: 17px;
            font-weight: bold;
            background: rgba(255,255,255,0.9);
            padding: 8px 16px;
            border-radius: 20px;
            margin-top: 4px;
            margin-bottom: 16px;
            text-align: center;
        }

        .question-card {
            width: min(88%, 520px);
            min-height: 120px;
            background: rgba(255,255,255,0.96);
            border-radius: 18px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px 20px;
            box-sizing: border-box;
            font-size: 24px;
            font-weight: 700;
            color: #2c3e50;
            line-height: 1.5;
            margin-top: 12px;
        }

        .character-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }

        #characterImg {
            width: min(42vw, 220px);
            max-width: 220px;
            min-width: 120px;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        #feedback {
            min-height: 34px;
            margin-top: 8px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
        }

        .controls {
            width: min(90%, 520px);
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 28px;
        }

        .btn-answer {
            flex: 1;
            height: 88px;
            border: none;
            border-radius: 20px;
            font-size: 34px;
            font-weight: 800;
            color: white;
            cursor: pointer;
            box-shadow: 0 8px 18px rgba(0,0,0,0.18);
        }

        .btn-answer:active {
            transform: scale(0.98);
        }

        .btn-o {
            background: #2ecc71;
        }

        .btn-x {
            background: #e74c3c;
        }

        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #34495e;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
        }

        .main-btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
        }

        @media (max-width: 480px) {
            .question-card {
                font-size: 20px;
                min-height: 110px;
                padding: 20px 16px;
            }

            .btn-answer {
                height: 80px;
                font-size: 30px;
            }

            #feedback {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>

    <div id="entryScreen">
        <h2 style="color:#2c3e50; margin-top: 0;">🏥 감염관리 챌린지</h2>

        <div class="input-group">
            <label>소속</label>
            <input type="text" id="affiliationInput" placeholder="소속 입력">
        </div>

        <div class="input-group">
            <label>이름</label>
            <input type="text" id="nameInput" placeholder="이름 입력">
        </div>

        <button class="main-btn" onclick="startGame()">Start Game</button>
    </div>

    <div id="gameScreen">
        <div id="ui">
            <div class="score-board">
                <span id="playerInfo"></span> |
                점수: <span id="scoreVal">0</span> |
                진행: <span id="progressVal">1</span>/<span id="totalVal">0</span>
            </div>

            <div id="questionCard" class="question-card">
                문제를 불러오는 중...
            </div>

            <div id="feedback"></div>

            <div class="character-wrap">
                <img id="characterImg" src="Me.png" alt="캐릭터">
            </div>

            <div class="controls">
                <button class="btn-answer btn-o" onclick="chooseAnswer('O')">O</button>
                <button class="btn-answer btn-x" onclick="chooseAnswer('X')">X</button>
            </div>
        </div>
    </div>

    <div id="resultScreen" style="display:none;">
        <h2 style="color:#2c3e50; margin-top: 0;">수고하셨습니다!</h2>
        <p id="finalScore" style="font-size: 24px; font-weight: bold;"></p>
        <p id="finalComment" style="font-size: 18px; line-height: 1.5;"></p>
        <button class="main-btn" onclick="location.reload()">다시 하기</button>
    </div>

<script>
    const quizData = [
        { q: "Skin prep 전 멸균 장갑을 착용해야 한다.", a: "O", explanation: "오염 예방을 위해 적절한 보호구 착용이 중요합니다." },
        { q: "유치도뇨관 삽입 전 요도구만 간단히 닦으면 충분하다.", a: "X", explanation: "삽입 전에는 무균술과 충분한 소독 절차가 필요합니다." },
        { q: "마스크는 코와 입을 완전히 가려야 한다.", a: "O", explanation: "코를 노출하면 비말 차단 효과가 떨어집니다." },
        { q: "오염된 장갑으로 다른 기구를 만져도 괜찮다.", a: "X", explanation: "오염 확산 위험이 있으므로 장갑 교체가 필요합니다." },
        { q: "손위생은 환자 접촉 전후 모두 중요하다.", a: "O", explanation: "의료 관련 감염 예방의 기본입니다." },
        { q: "주사 준비 중 한 번 소독한 트레이는 계속 청결 구역으로 볼 수 있다.", a: "X", explanation: "오염 가능성이 생기면 다시 청결 상태를 확인해야 합니다." },
        { q: "찔림 사고가 발생하면 즉시 보고해야 한다.", a: "O", explanation: "노출 후 조치와 추적 관리가 필요합니다." },
        { q: "수술실에서 머리카락이 일부 노출되어도 큰 문제는 아니다.", a: "X", explanation: "노출을 최소화하도록 캡을 올바르게 착용해야 합니다." }
    ];

    let score = 0;
    let currentQIndex = 0;
    let isAnswerLocked = false;
    let currentAffiliation = '';
    let currentName = '';

    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxe5NjMLeJ0Fa_VIxEidrmFmsg7J1BH5awJhP72_SSiwdGMvmGNvAgRvzBZacjzNpVG/exec';

    function saveResultToSheet(affiliation, name, score) {
        const formData = new FormData();
        formData.append('affiliation', affiliation);
        formData.append('name', name);
        formData.append('score', score);

        fetch(SCRIPT_URL, {
            method: 'POST',
            body: formData,
            mode: 'no-cors'
        }).catch(error => {
            console.error('저장 실패:', error);
        });
    }

    function startGame() {
        const affiliation = document.getElementById('affiliationInput').value.trim();
        const name = document.getElementById('nameInput').value.trim();

        if (!name) {
            alert("이름을 입력해 주세요!");
            return;
        }

        currentAffiliation = affiliation;
        currentName = name;

        document.getElementById('playerInfo').innerText = `${affiliation} ${name}`.trim();
        document.getElementById('entryScreen').style.display = 'none';
        document.getElementById('resultScreen').style.display = 'none';
        document.getElementById('gameScreen').style.display = 'block';

        score = 0;
        currentQIndex = 0;
        isAnswerLocked = false;

        document.getElementById('scoreVal').innerText = score;
        document.getElementById('totalVal').innerText = quizData.length;
        showQuestion();
    }

    function showQuestion() {
        const current = quizData[currentQIndex];
        document.getElementById('questionCard').innerText = current.q;
        document.getElementById('progressVal').innerText = currentQIndex + 1;
        document.getElementById('feedback').innerText = "";
        document.getElementById('feedback').style.color = "#2c3e50";
        isAnswerLocked = false;
    }

    function chooseAnswer(choice) {
        if (isAnswerLocked) return;
        isAnswerLocked = true;

        const current = quizData[currentQIndex];
        const feedbackEl = document.getElementById('feedback');

        if (choice === current.a) {
            score += 10;
            feedbackEl.style.color = "#27ae60";
            feedbackEl.innerText = `정답! +10 / ${current.explanation}`;
        } else {
            feedbackEl.style.color = "#c0392b";
            feedbackEl.innerText = `오답! 0점 / ${current.explanation}`;
        }

        document.getElementById('scoreVal').innerText = score;

        setTimeout(() => {
            currentQIndex++;

            if (currentQIndex >= quizData.length) {
                endGame();
            } else {
                showQuestion();
            }
        }, 1200);
    }

    function endGame() {
        document.getElementById('gameScreen').style.display = 'none';
        document.getElementById('resultScreen').style.display = 'block';
        document.getElementById('finalScore').innerText = `최종 점수: ${score}점`;

        let comment = "";
        if (score >= 70) {
            comment = "훌륭합니다! 감염관리 기본 수칙을 잘 이해하고 있습니다.";
        } else if (score >= 40) {
            comment = "좋습니다. 몇 가지 핵심 수칙을 더 복습하면 더 좋아집니다.";
        } else {
            comment = "기본 감염관리 수칙을 다시 한 번 복습해 보세요.";
        }

        document.getElementById('finalComment').innerText = comment;

        saveResultToSheet(currentAffiliation, currentName, score);
    }

    document.getElementById('nameInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') startGame();
    });

    document.getElementById('affiliationInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') startGame();
    });
</script>
</body>
</html>
